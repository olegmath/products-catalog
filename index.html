<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Оплата курсов | Planck School</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23111827'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-family='Arial' font-size='36' font-weight='700' fill='white'%3EP%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#" aria-label="Planck School">
        <span class="brand-mark" aria-hidden="true">P</span>
        <span>Постоянная Планка</span>
      </a>
      <div class="secure-note" aria-label="Безопасная оплата">
        <span class="secure-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.6-2.9 8.6-7 10-4.1-1.4-7-5.4-7-10V6l7-3z"/><path d="M8.7 12.2l2.1 2.1 4.6-5"/></svg>
        </span>
        <span><strong>Безопасная оплата</strong><small>Данные защищены</small></span>
      </div>
    </header>

    <main class="page-shell">
      <section class="checkout-grid">
        <section class="catalog-panel" aria-labelledby="catalogTitle">
          <div class="section-head">
            <div>
              <h1 id="catalogTitle">Выберите пакеты</h1>
              <span id="selectedCounter" class="counter">0 выбрано</span>
            </div>
            <div class="toolbar">
              <label class="sort-select">
                <span>Сортировка</span>
                <select id="sortSelect">
                  <option value="popular">по популярности</option>
                  <option value="priceAsc">сначала дешевле</option>
                  <option value="priceDesc">сначала дороже</option>
                </select>
              </label>
            </div>
          </div>
          <div class="exam-tabs" role="tablist" aria-label="Экзамен">
            <button class="exam-tab active" type="button" role="tab" aria-selected="true" data-exam-tab="ege">ЕГЭ</button>
            <button class="exam-tab" type="button" role="tab" aria-selected="false" data-exam-tab="oge">ОГЭ</button>
          </div>
          <div id="courseList" class="course-list" aria-live="polite"></div>
        </section>

        <aside class="order-panel" aria-labelledby="orderTitle">
          <div class="order-head">
            <h2 id="orderTitle">Ваш заказ</h2>
            <span id="orderCount" class="counter accent">0 курсов</span>
          </div>
          <div id="orderItems" class="order-items"></div>

          <div class="summary-lines">
            <div><span>Сумма</span><strong id="subtotal">0 ₽</strong></div>
            <label class="promo-line">
              <span>Промокод</span>
              <input id="promoInput" name="promo" value="" placeholder="Введите" aria-label="Промокод" />
            </label>
            <div id="promoDiscountLine" class="discount" hidden><span>Скидка по промокоду</span><strong id="discount">0 ₽</strong></div>
            <div class="total-line"><span>Итого</span><strong id="total">0 ₽</strong></div>
          </div>

          <form id="paymentForm" class="payment-form">
            <fieldset>
              <legend>Ваши данные</legend>
              <label>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
                <input id="clientName" name="parentName" value="" placeholder="Фамилия Имя" autocomplete="name" title="Введите фамилию и имя кириллицей" required />
              </label>
              <label>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.4 2.1L8 9.7a16 16 0 0 0 6.3 6.3l1.3-1.3a2 2 0 0 1 2.1-.4c.8.3 1.7.5 2.6.6A2 2 0 0 1 22 16.9z"/></svg>
                <input id="clientPhone" name="parentPhone" value="" placeholder="+7 999 999 9999" autocomplete="tel" inputmode="tel" title="Введите российский номер телефона" required />
              </label>
            </fieldset>

            <fieldset>
              <legend>Данные ребенка</legend>
              <label>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
                <input id="studentName" name="studentName" value="" placeholder="Фамилия Имя" autocomplete="off" title="Введите фамилию и имя кириллицей" required />
              </label>
              <label>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.4 2.1L8 9.7a16 16 0 0 0 6.3 6.3l1.3-1.3a2 2 0 0 1 2.1-.4c.8.3 1.7.5 2.6.6A2 2 0 0 1 22 16.9z"/></svg>
                <input id="studentPhone" name="studentPhone" value="" placeholder="+7 999 999 9999" autocomplete="off" inputmode="tel" title="Введите российский номер телефона" required />
              </label>
            </fieldset>

            <fieldset>
              <legend>Способ оплаты</legend>
              <div class="payment-methods" role="radiogroup" aria-label="Способ оплаты">
                <label class="method active">
                  <input type="radio" name="method" value="SBP" checked />
                  <span class="sbp-icon"></span>
                  <span><strong>СБП</strong><small>Оплата по QR или через банк</small></span>
                </label>
              </div>
            </fieldset>

            <button id="payButton" class="pay-button" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
              <span>Оплатить всё сразу</span>
              <strong id="buttonTotal">0 ₽</strong>
            </button>
            <p class="legal">Нажимая кнопку, вы соглашаетесь с офертой и политикой обработки персональных данных.</p>
          </form>
          <div id="checkoutResult" class="checkout-result" hidden></div>
        </aside>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
